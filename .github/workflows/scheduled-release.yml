name: Scheduled Weekly Release

on:
  schedule:
    - cron: "0 18 * * 5" # Every Friday at 18:00 UTC (12:00 CST)
  workflow_dispatch:

concurrency:
  group: weekly-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check if release is needed
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if gh release view "$version" &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — release $version already exists"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will create release $version"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: "20.x"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Lint
        if: steps.check.outputs.skip != 'true'
        run: npm run lint

      - name: Test
        if: steps.check.outputs.skip != 'true'
        run: npm test

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Tag and release
        if: steps.check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            if (versions[process.env.VERSION] === undefined) {
              versions[process.env.VERSION] = manifest.minAppVersion;
              fs.writeFileSync('versions.json', JSON.stringify(versions, null, '\t') + '\n');
            }
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet versions.json 2>/dev/null; then
            git add versions.json
            git commit -m "chore: sync versions.json for $VERSION"
            git push origin HEAD
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" \
            --title="$VERSION" \
            --generate-notes \
            main.js manifest.json styles.css
